<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strumyk by SZAFQU</title>
    <link rel="icon" type="image/png" href="https://cdn.szafqu.us/media/avataro.png">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- JWPlayer -->
    <script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>

    <!-- Shaka Player + UI (Zastępuje Clappr) -->
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: {
                            400: '#c084fc',
                            500: '#a855f7',
                            600: '#9333ea',
                        },
                        dark: { 900: '#050505' }
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #fff; overflow: hidden; }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a855f7; }

        #entry-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: opacity 0.8s, visibility 0.8s;
        }
        .click-text {
            font-size: 1.2rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 300;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 0.3; }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(255,255,255,0.4); }
        }
        .hidden-overlay { opacity: 0; visibility: hidden; pointer-events: none; }

        .video-background {
            position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1;
            opacity: 0.3; filter: grayscale(0.2) blur(2px); transition: filter 1s;
        }
        body.loaded .video-background { filter: grayscale(0.2) blur(0); }

        .glass-fx {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .app-container {
            opacity: 0; transform: scale(0.98);
            transition: opacity 0.8s, transform 0.8s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        body.loaded .app-container { opacity: 1; transform: scale(1); }

        .channel-btn {
            transition: all 0.3s; background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
        }
        .channel-btn:active { transform: scale(0.96); }
        .icon-bg {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .channel-btn:hover {
            background: rgba(255,255,255,0.05); border-color: rgba(168,85,247,0.3);
            transform: translateY(-2px);
        }
        .channel-btn:hover .icon-bg {
            background: rgba(0,0,0,0.6); border-color: rgba(168,85,247,0.5);
            box-shadow: 0 0 10px rgba(168,85,247,0.2);
        }
        .channel-btn.active-channel {
            background: rgba(168,85,247,0.1); border-color: #a855f7;
            box-shadow: 0 5px 15px rgba(168,85,247,0.2);
        }
        .channel-btn.active-channel .icon-bg {
            background: rgba(0,0,0,0.8); border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168,85,247,0.4);
        }
        .jw-logo { display: none !important; }

        /* Tryb embed */
        body.embed-mode aside,
        body.embed-mode #entry-overlay,
        body.embed-mode .flex.md\:hidden,
        body.embed-mode .order-3 { display: none !important; }
        body.embed-mode main { padding: 0 !important; }
        body.embed-mode .w-full.max-w-5xl { max-width: 100% !important; height: 100vh !important; gap: 0 !important; }
        body.embed-mode .glass-fx.w-full.rounded-xl {
            border-radius: 0 !important; height: 100vh !important; padding: 0 !important;
            border: none !important; background: transparent !important; backdrop-filter: none !important;
        }
        body.embed-mode .w-full.aspect-video {
            aspect-ratio: unset !important; height: 100vh !important; border-radius: 0 !important;
        }
    </style>
</head>
<body class="font-sans w-full h-[100dvh]">

<div id="entry-overlay"><div class="click-text">Click to enter</div></div>

<video loop muted playsinline class="video-background" id="bg-video">
    <source src="https://cdn.szafqu.us/media/wideo.webm" type="video/webm">
</video>
<audio id="bg-audio" loop>
    <source src="https://cdn.szafqu.us/media/audio.mp3" type="audio/mpeg">
</audio>

<div class="app-container w-full h-full flex flex-col md:flex-row relative z-10">
    
    <!-- Sidebar -->
    <aside class="glass-fx w-full md:w-[370px] flex flex-col z-20 order-2 md:order-1 flex-1 md:flex-none md:h-full shrink-0 border-t md:border-t-0 md:border-r md:rounded-r-2xl shadow-[10px_0_30px_rgba(0,0,0,0.5)] overflow-hidden">
        <div class="hidden md:flex p-4 md:p-6 border-b border-white/10 items-center gap-4 shrink-0 bg-black/40">
            <img src="https://cdn.szafqu.us/media/avatark.jpg" alt="Profile" class="w-12 h-12 rounded-full object-cover border-2 border-accent-500/50 shadow-[0_0_15px_rgba(168,85,247,0.3)]">
            <div>
                <h1 class="text-lg md:text-xl font-bold tracking-wide">Strumyk</h1>
                <p class="text-xs text-gray-400 font-medium">by szafqu · kanały sportowe</p>
            </div>
        </div>

        <div class="p-4 border-b border-white/10 bg-black/20 shrink-0">
            <div class="relative">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                <input type="text" id="search-input" placeholder="Wyszukaj kanał..." 
                       class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pl-10 pr-4 text-white text-sm focus:outline-none focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-all placeholder-gray-500">
            </div>
        </div>

        <div id="channel-list" class="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-2 flex flex-col">
            <!-- dynamiczne -->
        </div>
        <div id="no-results-msg" class="hidden p-5 text-center text-gray-400 text-sm border-t border-white/5">
            Brak wyników dla podanej frazy
        </div>
    </aside>

    <!-- Main player -->
    <main class="w-full relative flex flex-col items-center justify-center order-1 md:order-2 shrink-0 md:flex-1 p-3 md:p-8 bg-black/60 md:bg-transparent">
        <div class="w-full max-w-5xl flex flex-col gap-3 md:gap-5 z-10">
            
            <!-- Mobile header -->
            <div class="flex md:hidden items-center gap-3 shrink-0 px-1 order-1 mb-1">
                <img src="https://cdn.szafqu.us/media/avatark.jpg" alt="Profile" class="w-12 h-12 rounded-full object-cover border-2 border-accent-500/50 shadow-[0_0_15px_rgba(168,85,247,0.3)]">
                <div>
                    <h1 class="text-lg font-bold tracking-wide">Strumyk</h1>
                    <p class="text-xs text-gray-400 font-medium">by szafqu · kanały sportowe</p>
                </div>
            </div>

            <!-- Info bar -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center px-1 md:px-2 order-3 md:order-1 mt-1 md:mt-0 gap-3 relative z-50 w-full">
                
                <div class="flex flex-col w-full md:w-1/2">
                    <div class="flex items-center gap-2 shrink-0 relative">
                        <span id="current-channel-name" class="glass-fx text-xs md:text-base font-semibold tracking-wide text-white px-4 py-1.5 rounded-full flex items-center gap-2">
                            <i class="ph ph-play-circle text-accent-400 text-lg"></i> Wybierz kanał
                        </span>
                        
                        <button id="copy-link-btn" class="hidden glass-fx w-9 h-9 md:w-10 md:h-10 rounded-full text-gray-400 hover:text-accent-400 hover:border-accent-500 transition-all relative flex items-center justify-center cursor-pointer shrink-0" title="Skopiuj link do strumienia">
                            <i class="ph ph-link text-base md:text-lg"></i>
                            <span id="copy-tooltip" class="absolute top-full mt-2 left-1/2 -translate-x-1/2 text-[10px] bg-black/90 text-white px-2 py-1 rounded opacity-0 transition-opacity duration-300 whitespace-nowrap pointer-events-none border border-white/10 z-50">Skopiowano!</span>
                        </button>

                        <a id="epg-link-btn" href="epg.html" class="hidden glass-fx w-9 h-9 md:w-10 md:h-10 rounded-full text-gray-400 hover:text-white hover:text-accent-400 hover:border-accent-500 transition-all relative flex items-center justify-center cursor-pointer shrink-0" title="Pełny program TV (EPG)">
                            <i class="ph ph-calendar-blank text-base md:text-lg"></i>
                        </a>
                    </div>
                    
                    <!-- Pasek EPG - Aktualnie grany program -->
                    <div id="current-epg-info" class="hidden w-full max-w-sm mt-2 md:mt-1.5 px-1">
                        <div class="flex justify-between items-center text-[10px] md:text-xs text-gray-400 mb-1">
                            <span id="epg-now-title" class="truncate font-medium text-white max-w-[75%]"></span>
                            <span id="epg-now-time" class="shrink-0 text-accent-400 font-medium"></span>
                        </div>
                        <div class="w-full h-1.5 bg-black/40 border border-white/10 rounded-full overflow-hidden">
                            <div id="epg-now-progress" class="h-full bg-accent-500 shadow-[0_0_10px_#a855f7] transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                
                <div id="sources-container" class="flex flex-wrap gap-2 hidden w-full md:w-auto justify-start md:justify-end mt-2 md:mt-0"></div>
            </div>

            <!-- Player container -->
            <div class="glass-fx w-full rounded-xl md:rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.7)] p-1 overflow-hidden order-2 relative">
                <div class="w-full aspect-video rounded-lg md:rounded-xl overflow-hidden bg-black/80 relative flex items-center justify-center">
                    
                    <div id="video-placeholder" class="flex flex-col items-center justify-center h-full w-full text-gray-400 gap-2 md:gap-4 absolute inset-0 z-30 transition-opacity duration-300 pointer-events-none">
                        <i class="ph ph-television-simple text-4xl md:text-6xl text-white/10 drop-shadow-[0_0_15px_rgba(168,85,247,0.2)]"></i>
                        <span class="text-xs md:text-sm font-light tracking-wider uppercase opacity-70">Oczekiwanie na wybór stacji</span>
                    </div>

                    <div id="jwplayer-wrapper" class="w-full h-full absolute inset-0 z-20 hidden">
                        <!-- JWPlayer będzie generowany dynamicznie -->
                    </div>

                    <!-- Kontener dla natywnego Shaka Player -->
                    <div id="shaka-wrapper" class="w-full h-full absolute inset-0 z-20 hidden bg-black">
                        <video id="shaka-video" class="w-full h-full" autoplay crossorigin="anonymous"></video>
                        <div id="shaka-error" class="hidden absolute inset-0 flex items-center justify-center bg-black/70 text-white text-sm z-50 p-4 text-center pointer-events-none">
                            Błąd odtwarzania strumienia DASH.<br>Sprawdź konsolę (F12) aby zobaczyć szczegóły.
                        </div>
                    </div>

                    <!-- Bez sandboxa -->
                    <iframe id="video-embed" class="w-full h-full absolute inset-0 hidden z-10 border-0 bg-black" 
                            src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>

                </div>
            </div>
        </div>
    </main>
</div>

<script>
    (function(){
        const overlay = document.getElementById('entry-overlay');
        const audio = document.getElementById('bg-audio');
        const video = document.getElementById('bg-video');

        let channels = [];
        let epgData = {}; // Dane EPG dla wszystkich kanałów
        let playerInstance = null; // JWPlayer
        let shakaPlayerInstance = null; // Shaka Player
        let shakaUIInstance = null; // Shaka UI
        let currentChannelIndex = -1;

        const listContainer = document.getElementById('channel-list');
        const noResultsMsg = document.getElementById('no-results-msg');
        const currentChannelLabel = document.getElementById('current-channel-name');
        const sourcesContainer = document.getElementById('sources-container');
        const searchInput = document.getElementById('search-input');
        
        const videoPlaceholder = document.getElementById('video-placeholder');
        const jwplayerWrapper = document.getElementById('jwplayer-wrapper');
        const shakaWrapper = document.getElementById('shaka-wrapper');
        const shakaVideo = document.getElementById('shaka-video');
        const videoEmbed = document.getElementById('video-embed');
        const copyLinkBtn = document.getElementById('copy-link-btn');
        const copyTooltip = document.getElementById('copy-tooltip');
        const epgLinkBtn = document.getElementById('epg-link-btn');
        const shakaErrorDiv = document.getElementById('shaka-error');

        // Referencje EPG aktualnego programu
        const currentEpgInfo = document.getElementById('current-epg-info');
        const epgNowTitle = document.getElementById('epg-now-title');
        const epgNowTime = document.getElementById('epg-now-time');
        const epgNowProgress = document.getElementById('epg-now-progress');

        // ===== HELPERS =====
        function normalizeSlug(name) {
            return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        }

        function findChannelBySlug(slug) {
            const normalized = normalizeSlug(slug);
            return channels.findIndex(ch => normalizeSlug(ch.name) === normalized);
        }

        // ===== EMBED MODE =====
        function handleEmbedMode() {
            const urlParams = new URLSearchParams(window.location.search);
            const embedParam = urlParams.get('embed');
            if (!embedParam) return false;

            let channelSlug, sourceName;
            
            const lastDashIndex = embedParam.lastIndexOf('-');
            if (lastDashIndex > 0) {
                const potentialSlug = embedParam.substring(0, lastDashIndex);
                const potentialSource = embedParam.substring(lastDashIndex + 1);
                const idx = findChannelBySlug(potentialSlug);
                if (idx !== -1) {
                    channelSlug = potentialSlug;
                    sourceName = potentialSource.replace(/-/g, ' ');
                }
            }
            
            if (!channelSlug) {
                channelSlug = embedParam;
                sourceName = null;
            }

            document.body.classList.add('embed-mode');
            overlay.style.display = 'none';
            document.body.classList.add('loaded');

            const index = findChannelBySlug(channelSlug);
            if (index === -1) return true;

            currentChannelIndex = index;
            const selected = channels[index];
            document.title = selected.name;

            let sourceIndex = 0;
            if (sourceName && selected.sources) {
                const normalizedSource = sourceName.trim().toLowerCase();
                const si = selected.sources.findIndex(s => s.name.toLowerCase().trim() === normalizedSource);
                if (si !== -1) sourceIndex = si;
            }

            loadSource(index, sourceIndex);
            return true;
        }

        // ===== INIT =====
        async function initApp() {
            // Inicjalizacja polyfilli dla Shaka Playera
            if (window.shaka) {
                shaka.polyfill.installAll();
                if (!shaka.Player.isBrowserSupported()) {
                    console.error('Przeglądarka nie obsługuje Shaka Playera.');
                }
            }

            try {
                const [channelsRes, epgRes] = await Promise.all([
                    fetch('C:\Users\edeko\Documents\GitHub\tv\channels.json'),
                    fetch('https://cdn.szafqu.us/epg_data.json').catch(() => null)
                ]);

                if (!channelsRes.ok) throw new Error('Błąd pobierania bazy kanałów');
                channels = await channelsRes.json();

                if (epgRes && epgRes.ok) {
                    try {
                        epgData = await epgRes.json();
                    } catch(epgErr) {
                        console.warn('Błąd parsowania epg_data.json – dane EPG pominięte:', epgErr);
                    }
                }
                
                const isEmbed = handleEmbedMode();
                if (!isEmbed) {
                    renderChannels();
                    handleDeepLinking();
                }

                // Odświeżaj pasek postępu EPG co 30 sekund
                setInterval(() => {
                    if (currentChannelIndex !== -1) {
                        updateEPGNowPlaying(currentChannelIndex);
                    }
                }, 30000);

            } catch (e) {
                console.error(e);
                listContainer.innerHTML = '<div class="p-5 text-center text-red-400 text-sm">Nie udało się wczytać bazy kanałów.</div>';
            }
        }

        overlay.addEventListener('click', () => {
            overlay.classList.add('hidden-overlay');
            document.body.classList.add('loaded');
            if (audio) {
                audio.volume = 0.25;
                audio.play().catch(()=>{});
            }
            if (video) video.play().catch(()=>{});
        });

        function handleDeepLinking() {
            const urlParams = new URLSearchParams(window.location.search);
            const streamParam = urlParams.get('stream');
            if (!streamParam) return;
            
            const index = findChannelBySlug(streamParam);
            if (index !== -1) loadChannel(index);
        }

        async function copyChannelLink(index) {
            const channel = channels[index];
            if (!channel) return;
            const slug = normalizeSlug(channel.name);
            const url = new URL(window.location.href);
            url.searchParams.set('stream', slug);
            
            try {
                await navigator.clipboard.writeText(url.toString());
                copyTooltip.classList.remove('opacity-0');
                copyTooltip.classList.add('opacity-100');
                setTimeout(() => {
                    copyTooltip.classList.remove('opacity-100');
                    copyTooltip.classList.add('opacity-0');
                }, 2000);
            } catch (err) {
                alert('Nie udało się skopiować linku');
            }
        }

        function updateEPGNowPlaying(index) {
            const channel = channels[index];
            if (!channel) return;

            const channelNameLower = channel.name.toLowerCase();
            const rawSchedule = epgData[channelNameLower] || [];
            
            const now = new Date();
            let currentProgram = null;

            for (const prog of rawSchedule) {
                const start = new Date(prog.start);
                const end = new Date(prog.end);
                if (start <= now && end > now) {
                    currentProgram = { ...prog, startTime: start, endTime: end };
                    break;
                }
            }

            if (currentProgram) {
                currentEpgInfo.classList.remove('hidden');
                epgNowTitle.innerText = currentProgram.title;
                
                const formatTime = (d) => d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
                epgNowTime.innerText = `${formatTime(currentProgram.startTime)} - ${formatTime(currentProgram.endTime)}`;
                
                const totalDuration = currentProgram.endTime - currentProgram.startTime;
                const elapsed = now - currentProgram.startTime;
                const percent = Math.min(100, Math.max(0, (elapsed / totalDuration) * 100));
                
                epgNowProgress.style.width = `${percent}%`;
            } else {
                currentEpgInfo.classList.add('hidden');
            }
        }

        function loadChannel(index) {
            if (!channels[index]) return;
            currentChannelIndex = index;
            const selected = channels[index];
            const slug = normalizeSlug(selected.name);
            
            document.title = `${selected.name} | Strumyk`;
            if(audio) audio.pause();

            currentChannelLabel.innerHTML = `<i class="ph-fill ph-play-circle text-accent-400 text-lg"></i> ${selected.name}`;
            
            // Konfiguracja przycisków pomocniczych
            copyLinkBtn.classList.remove('hidden');
            copyLinkBtn.onclick = () => copyChannelLink(index);

            epgLinkBtn.classList.remove('hidden');
            epgLinkBtn.href = `epg.html?channel=${slug}`;

            // Pokaż EPG jeśli jest dostępne
            updateEPGNowPlaying(index);

            sourcesContainer.innerHTML = '';
            sourcesContainer.classList.remove('hidden');

            selected.sources.forEach((source, sIndex) => {
                const btn = document.createElement('button');
                btn.className = `source-btn px-3 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition-all border outline-none whitespace-nowrap`;
                btn.innerText = source.name;
                btn.onclick = () => loadSource(index, sIndex);
                sourcesContainer.appendChild(btn);
            });

            document.querySelectorAll('.channel-btn').forEach((btn, i) => {
                const nameSpan = btn.querySelector('.channel-name');
                const playIcon = btn.querySelector('.play-icon');
                if (i === index) {
                    btn.classList.add('active-channel');
                    if (nameSpan) nameSpan.classList.add('text-white', 'font-semibold');
                    if (playIcon) playIcon.classList.remove('opacity-0', 'invisible', 'translate-x-4');
                } else {
                    btn.classList.remove('active-channel');
                    if (nameSpan) nameSpan.classList.remove('text-white', 'font-semibold');
                    if (playIcon) playIcon.classList.add('opacity-0', 'invisible', 'translate-x-4');
                }
            });

            if (selected.sources && selected.sources.length > 0) {
                loadSource(index, 0);
            }
        }

        async function loadSource(cIndex, sIndex) {
            const source = channels[cIndex].sources[sIndex];

            videoPlaceholder.style.opacity = '0';
            setTimeout(() => videoPlaceholder.style.display = 'none', 250);

            const buttons = sourcesContainer.querySelectorAll('.source-btn');
            buttons.forEach((btn, i) => {
                if (i === sIndex) {
                    btn.className = 'source-btn px-3 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition-all border bg-accent-500/20 border-accent-500 text-white shadow-[0_0_10px_rgba(168,85,247,0.3)]';
                } else {
                    btn.className = 'source-btn px-3 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition-all border bg-white/5 border-white/10 text-gray-400 hover:text-white hover:bg-white/10';
                }
            });

            // Zatrzymywanie odtwarzaczy i reset interfejsu
            if (playerInstance) {
                try { playerInstance.remove(); } catch(e) {}
                playerInstance = null;
            }
            if (shakaPlayerInstance) {
                try { await shakaPlayerInstance.unload(); } catch(e) {}
            }
            shakaErrorDiv.classList.add('hidden');
            
            jwplayerWrapper.classList.add('hidden');
            shakaWrapper.classList.add('hidden');
            videoEmbed.classList.add('hidden');
            videoEmbed.src = '';

            // Wybór odtwarzacza
            if (source.type === 'm3u8') {
                jwplayerWrapper.classList.remove('hidden');
                
                let jwContainer = document.getElementById('jwplayer-container');
                if (!jwContainer) {
                    jwContainer = document.createElement('div');
                    jwContainer.id = 'jwplayer-container';
                    jwContainer.className = 'w-full h-full';
                    jwplayerWrapper.appendChild(jwContainer);
                }

                playerInstance = jwplayer("jwplayer-container").setup({
                    file: source.url,
                    width: "100%", height: "100%", autostart: true, mute: false,
                    stretching: "uniform", primary: "html5", preload: "auto", cast: {}
                });
                playerInstance.on('fullscreen', (e) => {
                    if (!e.fullscreen) setTimeout(() => playerInstance.resize('100%', '100%'), 300);
                });
            }
            else if (source.type === 'dash' || source.type === 'drm') {
                shakaWrapper.classList.remove('hidden');

                // Tworzenie instancji tylko raz
                if (!shakaPlayerInstance) {
                    shakaPlayerInstance = new shaka.Player(shakaVideo);
                    shakaUIInstance = new shaka.ui.Overlay(shakaPlayerInstance, shakaWrapper, shakaVideo);
                    
                    shakaPlayerInstance.addEventListener('error', (e) => {
                        console.error('Shaka Event Error:', e.detail);
                        shakaErrorDiv.classList.remove('hidden');
                    });
                }

                let drmConfig = {};
                if (source.keys) {
                    let parsedKeys = {};
                    if (Array.isArray(source.keys)) {
                        source.keys.forEach(k => {
                            if (k.kid && k.k) parsedKeys[k.kid] = k.k;
                        });
                    } else if (typeof source.keys === 'object') {
                        parsedKeys = source.keys;
                    } else if (typeof source.keys === 'string') {
                        const parts = source.keys.split(':');
                        if (parts.length === 2) parsedKeys[parts[0].trim()] = parts[1].trim();
                    }
                    if (Object.keys(parsedKeys).length > 0) drmConfig.clearKeys = parsedKeys;
                }

                if (source.licenseUrl || source.licenceUrl) {
                    const lUrl = source.licenseUrl || source.licenceUrl;
                    drmConfig.servers = {
                        'com.widevine.alpha': lUrl,
                        'com.microsoft.playready': lUrl
                    };
                }

                shakaPlayerInstance.configure({
                    drm: {
                        clearKeys: {},
                        servers: {},
                        advanced: {}
                    },
                    abr: {
                        enabled: true
                    }
                });

                if (Object.keys(drmConfig).length > 0) {
                    shakaPlayerInstance.configure({ drm: drmConfig });
                }

                try {
                    await shakaPlayerInstance.load(source.url);
                    shakaVideo.play().catch(e => console.warn("Autoplay zablokowany", e));
                } catch (e) {
                    console.error('Shaka Load Error:', e);
                    shakaErrorDiv.classList.remove('hidden');
                }
            }
            else if (source.type === 'embed') {
                videoEmbed.src = source.url;
                videoEmbed.classList.remove('hidden');
            }
        }

        function renderChannels() {
            listContainer.innerHTML = '';
            channels.forEach((ch, index) => {
                const btn = document.createElement('button');
                btn.className = `channel-btn group w-full flex items-center justify-between p-3 rounded-xl text-left cursor-pointer focus:outline-none`;
                btn.setAttribute('data-name', ch.name.toLowerCase());
                
                btn.innerHTML = `
                    <div class="flex items-center gap-4 flex-1 min-w-0">
                        <div class="icon-bg w-10 h-10 md:w-12 md:h-11 rounded-xl flex items-center justify-center shrink-0 relative overflow-hidden">
                            <img src="https://cdn.szafqu.us/${ch.icon}" alt="${ch.name}" loading="lazy" class="w-6 h-6 md:w-8 md:h-8 object-contain drop-shadow-md z-10" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\\'ph ph-television-simple text-xl md:text-2xl text-white/80\\'></i>';">
                        </div>
                        <span class="channel-name text-gray-400 text-sm md:text-base font-medium transition-colors group-hover:text-white truncate">${ch.name}</span>
                    </div>
                    <i class="ph-fill ph-play-circle text-xl md:text-2xl opacity-0 invisible translate-x-4 transition-all duration-300 play-icon group-hover:opacity-100 group-hover:visible group-hover:translate-x-0"></i>
                `;
                
                btn.onclick = () => loadChannel(index);
                listContainer.appendChild(btn);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const buttons = listContainer.querySelectorAll('.channel-btn');
            let visibleCount = 0;
            buttons.forEach(btn => {
                const name = btn.getAttribute('data-name');
                const match = name.includes(term);
                btn.style.display = match ? 'flex' : 'none';
                if (match) visibleCount++;
            });
            noResultsMsg.classList.toggle('hidden', visibleCount > 0 || term === '');
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                searchInput.value = '';
                searchInput.dispatchEvent(new Event('input'));
                searchInput.blur();
                return;
            }

            if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
            e.preventDefault();

            const buttons = [...listContainer.querySelectorAll('.channel-btn')].filter(b => b.style.display !== 'none');
            if (!buttons.length) return;

            const focused = document.activeElement;
            const currentIndex = buttons.indexOf(focused);

            let nextIndex;
            if (e.key === 'ArrowDown') {
                nextIndex = currentIndex === -1 ? 0 : Math.min(currentIndex + 1, buttons.length - 1);
            } else {
                nextIndex = currentIndex <= 0 ? 0 : currentIndex - 1;
            }

            buttons[nextIndex].focus();
            buttons[nextIndex].scrollIntoView({ block: 'nearest' });
        });

        listContainer.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                e.preventDefault();
                const buttons = [...listContainer.querySelectorAll('.channel-btn')].filter(b => b.style.display !== 'none');
                const currentIndex = buttons.indexOf(document.activeElement);

                let nextIndex;
                if (e.key === 'ArrowDown') {
                    nextIndex = Math.min(currentIndex + 1, buttons.length - 1);
                } else {
                    if (currentIndex <= 0) { searchInput.focus(); return; }
                    nextIndex = currentIndex - 1;
                }

                buttons[nextIndex].focus();
                buttons[nextIndex].scrollIntoView({ block: 'nearest' });
            }
        });

        window.addEventListener('resize', () => {
            if (playerInstance && !jwplayerWrapper.classList.contains('hidden')) {
                playerInstance.resize('100%', '100%');
            }
        });

        initApp();
    })();
</script>
</body>
</html>
