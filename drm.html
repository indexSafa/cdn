    // Dynamic config from EPISODES
    let CURRENT_EPISODE = EPISODES[0];
    function getManifestAndKeys(ep) {
        const [kid, value] = ep.key.split(':');
        return {
            manifest: ep.manifest,
            clearKeys: { [kid]: value }
        };
    }
    let MANIFEST_URL = CURRENT_EPISODE.manifest;
    let CLEAR_KEYS = (function() {
        const [kid, value] = CURRENT_EPISODE.key.split(':');

<script>
    (function buildSelector() {
        const container = document.getElementById('episodeSelector');
        EPISODES.forEach((ep, idx) => {
            const btn = document.createElement('button');
            btn.textContent = ep.ep;
            btn.style.cssText = 'font-size:11px; padding:4px 8px; border-radius:6px; border:1px solid #555; background:#1a1a1a; color:#aaa; cursor:pointer; transition:all .15s;';
            btn.title = ep.title;
            btn.addEventListener('click', () => {
                CURRENT_EPISODE = EPISODES[idx];
                loadEpisode(idx);
                container.querySelectorAll('button').forEach(b => {
                    b.style.background = '#1a1a1a';
                    b.style.color = '#aaa';
                    b.style.borderColor = '#555';
                });
                btn.style.background = '#0d6efd';
                btn.style.color = '#fff';
                btn.style.borderColor = '#0d6efd';
            });
            container.appendChild(btn);
        });
        // Mark first active
        const firstBtn = container.querySelector('button');
        if (firstBtn) {
            firstBtn.style.background = '#0d6efd';
            firstBtn.style.color = '#fff';
            firstBtn.style.borderColor = '#0d6efd';
        }
    })();
</script>

<div id="player">
    <video id="video" autoplay crossorigin="anonymous"></video>
</div>

<script>

    // ============================================

    let player = null;
    let uiOverlay = null;

    function forceHighestQuality() {
        if (!player) return;
        const variants = player.getVariantTracks ? player.getVariantTracks() : [];
        if (!variants.length) return;
        const best = variants.slice().sort((a, b) => b.bandwidth - a.bandwidth)[0];
        player.configure({ abr: { enabled: false } });
        player.selectVariantTrack(best, true);
    }


    function loadEpisode(idx) {
        CURRENT_EPISODE = EPISODES[idx];
        const cfg = getManifestAndKeys(CURRENT_EPISODE);
        MANIFEST_URL = cfg.manifest;
        CLEAR_KEYS = cfg.clearKeys;
        if (player) {
            player.configure({ drm: { clearKeys: CLEAR_KEYS } });
            player.load(MANIFEST_URL).catch(err => {
                console.error("Load error:", err);
            });
        } else {
            initPlayer();
        }
    }
    async function initPlayer() {
        const video = document.getElementById("video");
        const container = document.getElementById("player");

        if (!shaka.Player.isBrowserSupported()) {
            alert("Shaka: browser not supported");
            return;
        }

        shaka.polyfill.installAll();

        if (player) {
            try { await player.destroy(); } catch (e) {}
            player = null;
            uiOverlay = null;
        }

        player = new shaka.Player(video);
        uiOverlay = new shaka.ui.Overlay(player, container, video);

        player.addEventListener("error", e => {
            console.error("Shaka error", e.detail);
        });

        player.configure({
            drm: {
                clearKeys: CLEAR_KEYS
            },
            streaming: {
                rebufferingGoal: 2,
                bufferBehind: 30,
            }
        });

        try {
            await player.load(CURRENT_EPISODE.manifest);
        } catch (e) {
            console.error("Load error:", e);
            alert("Failed to load manifest: " + (e.message || e));
            return;
        }

        // Force highest quality
        forceHighestQuality();

        video.play().catch(err => {
            console.warn("video.play() blocked:", err);
        });
    }

    // Start player automatically
    document.addEventListener("DOMContentLoaded", () => {
        initPlayer().catch(err => console.error(err));
    });
</script>
