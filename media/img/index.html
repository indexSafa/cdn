<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przeglądarka PNG - GitHub Pages</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #fff; padding: 20px; margin: 0; }
        h1 { text-align: center; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            padding: 20px 0;
        }
        
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover { transform: translateY(-3px); border-color: #007acc; }
        
        .card img {
            width: 100%;
            height: 140px;
            object-fit: contain;
            border-radius: 4px;
            cursor: pointer;
            background-color: #1a1a1a;
        }

        .card p {
            margin: 8px 0 0 0;
            font-size: 13px;
            word-break: break-word;
            color: #ccc;
        }

        /* Fullscreen Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal img { max-width: 90%; max-height: 90%; border-radius: 6px; }
    </style>
</head>
<body>

    <h1>Galeria plików PNG</h1>
    <div class="gallery" id="gallery">Pobieranie plików...</div>

    <div class="modal" id="modal" onclick="closeModal()">
        <img id="modal-img" src="" alt="Podgląd">
    </div>

    <script>
        // === USTAWIENIA ===
        const username = 'indexSafa'; // Np. 'jan-kowalski'
        const repo = 'cdn';         // Np. 'moje-zdjecia'
        const folderPath = 'media/img';                      // Zostaw pusty '' dla głównego katalogu, lub wpisz np. 'images' jeśli pliki są w podfolderze

        // Endpoint GitHub API
        const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`;

        async function loadImages() {
            const gallery = document.getElementById('gallery');
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Nie udało się pobrać listy plików.');

                const files = await response.json();
                
                // Filtrujemy tylko pliki z rozszerzeniem .png
                const pngFiles = files.filter(file => file.name.toLowerCase().endsWith('.png'));

                if (pngFiles.length === 0) {
                    gallery.innerHTML = '<p>Brak plików PNG w tym folderze.</p>';
                    return;
                }

                gallery.innerHTML = ''; // Czyszczenie komunikatu ładowania

                pngFiles.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    // Używamy `download_url` bezpośrednio z surowych zasobów GitHub
                    card.innerHTML = `
                        <img src="${file.download_url}" alt="${file.name}" onclick="openModal('${file.download_url}')">
                        <p>${file.name}</p>
                    `;
                    gallery.appendChild(card);
                });

            } catch (error) {
                gallery.innerHTML = `<p style="color: red;">Błąd: ${error.message}</p>`;
            }
        }

        function openModal(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Uruchomienie skryptu
        loadImages();
    </script>
</body>
</html>
