<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prywatny Odtwarzacz Streamów</title>
    <!-- Tailwind CSS do stylizacji -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Clappr Player do odtwarzania m3u8 -->
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <!-- Ikony -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Niestandardowe paski przewijania */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans antialiased h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- Pasek boczny (Lista kanałów) -->
    <aside class="w-full md:w-80 bg-slate-800 border-r border-slate-700 flex flex-col h-1/3 md:h-full z-10 shadow-xl">
        <div class="p-4 border-b border-slate-700 bg-slate-800 flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center gap-2 text-indigo-400">
                <i data-lucide="monitor-play"></i>
                Moje Streamy
            </h1>
        </div>
        <div class="flex-1 overflow-y-auto p-2" id="channel-list">
            <!-- Kanały będą renderowane tutaj przez JavaScript -->
        </div>
    </aside>

    <!-- Główna zawartość (Odtwarzacz) -->
    <main class="flex-1 bg-black relative flex items-center justify-center h-2/3 md:h-full">
        <!-- Komunikat powitalny -->
        <div id="placeholder" class="text-center text-slate-500 absolute inset-0 flex flex-col items-center justify-center bg-slate-900">
            <i data-lucide="film" class="w-16 h-16 mb-4 opacity-50"></i>
            <h2 class="text-2xl font-semibold mb-2">Wybierz kanał z listy</h2>
            <p>Aby rozpocząć oglądanie, kliknij jeden ze strumieni po lewej stronie.</p>
        </div>

        <!-- Odtwarzacz Clappr (Zastępuje czysty tag video) -->
        <div id="player-container" class="w-full h-full hidden"></div>

        <!-- Odtwarzacz Embed (Iframe tag) -->
        <iframe id="iframe-player" class="w-full h-full border-0 hidden" allow="autoplay; fullscreen" allowfullscreen></iframe>
        
        <!-- Wskaźnik ładowania -->
        <div id="loading" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center z-50">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-indigo-500"></i>
        </div>
    </main>

    <script>
        // Inicjalizacja ikon
        lucide.createIcons();

        // Baza Twoich strumieni
        const streams = [
            { 
                id: 1, 
                name: "Canal+ (Nasz)", 
                url: "http://ppv:ppv@217.160.186.100:1234/stream/canalplus/1/master.m3u8", 
                type: "hls",
                desc: "Kanał prywatny"
            },
            { 
                id: 2, 
                name: "Streamhub", 
                url: "https://hugh.cdn.rumble.cloud/live/gke17oc4/live-hls/xskk-bdua/chunklist_i1.m3u8", 
                type: "hls",
                desc: "Rumble CDN"
            },
            { 
                id: 3, 
                name: "IPTV Wioska", 
                url: "https://streamer.filmowo.xyz/memfs/9e8021d2-817e-43d1-8a65-b296ecb78a2f.m3u8", 
                type: "hls",
                desc: "Serwer Filmowo"
            },
            { 
                id: 4, 
                name: "IPTV 365", 
                url: "https://streamer.filmowo.xyz/memfs/0e9b3551-77c9-4be0-b741-aefd3f891d7d.m3u8", 
                type: "hls",
                desc: "Serwer Filmowo"
            },
            { 
                id: 5, 
                name: "Strumyk (Darmowe)", 
                url: "https://videocdn-4726.website/shopping/?channel_id=njstrim7", 
                type: "embed",
                desc: "Web Player Embed"
            },
            { 
                id: 6, 
                name: "Timstreams (Darmowe)", 
                url: "https://junkieembeds.pages.dev/embed/prime-show-mma-17", 
                type: "embed",
                desc: "Timstreams Embed"
            }
        ];

        // Elementy DOM
        const channelList = document.getElementById('channel-list');
        const playerContainer = document.getElementById('player-container');
        const iframePlayer = document.getElementById('iframe-player');
        const placeholder = document.getElementById('placeholder');
        const loading = document.getElementById('loading');
        
        let clapprPlayer = null;
        let activeChannelId = null;

        // Renderowanie listy kanałów
        function renderChannels() {
            channelList.innerHTML = '';
            streams.forEach(stream => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3 mb-2 rounded-lg transition-all duration-200 flex items-center gap-3 group border border-transparent 
                    ${activeChannelId === stream.id ? 'bg-indigo-600 border-indigo-500' : 'bg-slate-800 hover:bg-slate-700 hover:border-slate-600'}`;
                
                const iconType = stream.type === 'hls' ? 'radio' : 'globe';
                
                btn.innerHTML = `
                    <div class="${activeChannelId === stream.id ? 'text-white' : 'text-slate-400 group-hover:text-white'}">
                        <i data-lucide="${iconType}" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div class="font-medium ${activeChannelId === stream.id ? 'text-white' : 'text-slate-200'}">${stream.name}</div>
                        <div class="text-xs ${activeChannelId === stream.id ? 'text-indigo-200' : 'text-slate-500'}">${stream.desc}</div>
                    </div>
                `;
                
                btn.onclick = () => playStream(stream);
                channelList.appendChild(btn);
            });
            lucide.createIcons();
        }

        // Funkcja odtwarzania
        function playStream(stream) {
            activeChannelId = stream.id;
            renderChannels(); // Aktualizuj style przycisków
            
            // Ukryj placeholder
            placeholder.classList.add('hidden');
            loading.classList.remove('hidden');

            // Zatrzymaj poprzedni odtwarzacz Clappr jeśli istnieje
            if (clapprPlayer) {
                clapprPlayer.destroy();
                clapprPlayer = null;
            }

            if (stream.type === 'hls') {
                // Konfiguracja dla HLS (.m3u8) z użyciem Clappr
                iframePlayer.classList.add('hidden');
                iframePlayer.src = '';
                playerContainer.classList.remove('hidden');

                // Inicjalizacja i wpięcie odtwarzacza Clappr
                clapprPlayer = new Clappr.Player({
                    source: stream.url,
                    parentId: "#player-container",
                    width: '100%',
                    height: '100%',
                    autoPlay: true,
                    mediacontrol: { seekbar: "#4f46e5", buttons: "#ffffff" } // Pasek w kolorze indigo
                });
                
                // Clappr ma swój własny ładny wskaźnik ładowania (spinner)
                loading.classList.add('hidden');

            } else if (stream.type === 'embed') {
                // Konfiguracja dla wklejanych Iframe
                playerContainer.classList.add('hidden');
                iframePlayer.classList.remove('hidden');
                
                iframePlayer.onload = () => {
                    loading.classList.add('hidden');
                };
                
                iframePlayer.src = stream.url;
            }
        }

        // Pierwsze renderowanie
        renderChannels();
    </script>
</body>
</html>
